# Enable mouse support
set -g mouse on

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Move between panes with Option+Arrow on Mac (no prefix needed)
# Requires iTerm2: Preferences > Profiles > Keys > Left Option Key = Esc+
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Cycle pane layouts (explicitly bound to ensure it works)
bind Space next-layout

# Start windows and panes from index 1
set -g base-index 1
setw -g pane-base-index 1

# True color support (for Neovim themes)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Status bar — Catppuccin Mocha (block/segment style for contrast)
set -g status-position bottom
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'

# Left: session name on a Mauve background block
set -g status-left '#[bg=#cba6f7 fg=#1e1e2e bold]  #S #[bg=#1e1e2e fg=#cba6f7]'
set -g status-left-length 40

# Right: hostname (Teal/Surface1) | time (Blue) | date (Peach)
set -g status-right '#[bg=#45475a fg=#94e2d5 bold] #h #[bg=#89b4fa fg=#1e1e2e bold] %H:%M #[bg=#fab387 fg=#1e1e2e bold] %a %d %b '
set -g status-right-length 60

# Window tabs — inactive on Surface0, active on Mauve (matches session block)
set -g window-status-format         '#[bg=#313244 fg=#585b70] #I:#W '
set -g window-status-current-format '#[bg=#cba6f7 fg=#1e1e2e bold] #I:#W '
set -g window-status-separator      '#[bg=#1e1e2e]'

# Pane borders — bumped one surface level for visibility
set -g pane-border-style        'fg=#45475a'
set -g pane-active-border-style 'fg=#cba6f7'
