# Enable mouse support
set -g mouse on


# macOS intercepts Ctrl+Arrow for Spaces, so use H/J/K/L instead (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Cycle pane layouts (explicitly bound to ensure it works)
bind Space next-layout

# Start windows and panes from index 1
set -g base-index 1
setw -g pane-base-index 1

# True color support (for Neovim themes)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Status bar — Catppuccin Mocha, handcrafted pipe-segment style
set -g status-position top
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-interval 10

# Left: session name block → pipe-separated window tabs
set -g status-left '#[bg=#cba6f7 fg=#1e1e2e bold]  #S #[bg=#1e1e2e fg=#45475a]| '
set -g status-left-length 60
set -g status-justify left

# Window tabs — inactive dim, active Green, pipe-separated
set -g window-status-format         '#[bg=#1e1e2e fg=#585b70] #I:#W #[fg=#45475a]|'
set -g window-status-current-format '#[bg=#a6e3a1 fg=#1e1e2e bold] #I:#W #[bg=#1e1e2e fg=#45475a]|'
set -g window-status-separator      ''

# Right: CPU | MEM | session uptime
set -g status-right-length 80
set -g status-right '#[bg=#1e1e2e fg=#f38ba8 bold] CPU:#(~/.config/tmux/scripts/cpu.sh) #[fg=#45475a]|#[bg=#1e1e2e fg=#89b4fa bold] MEM:#(~/.config/tmux/scripts/mem.sh) #[fg=#45475a]|#[bg=#1e1e2e fg=#a6e3a1 bold] UP:#(~/.config/tmux/scripts/uptime.sh #{session_created}) '

# Pane borders — active highlighted in green with border label
set -g pane-border-lines        heavy
set -g pane-border-style        'fg=#45475a'
set -g pane-active-border-style 'fg=#a6e3a1 bold'
set -g pane-border-status       top
set -g pane-border-format       '#{?pane_active,#[fg=#a6e3a1 bold] #P: #{pane_current_command} ,#[fg=#45475a] #P: #{pane_current_command} }'
